name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Sheet URL into main.js
        run: |
          sed -i 's|https://script.google.com/a/macros/ucsc.edu/s/AKfycbxYRcgDC56UNRN0fH-S2WhKnpLcgbXFibqMYwmZE4G5xzYr3UpLp4tQ5zLF2a3mjVwdSA/exec|${{ secrets.SURVEY_URL }}|g' main.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
