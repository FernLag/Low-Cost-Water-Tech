<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Pillowtech Code Generator</title>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Pillowtech Code Generator</h1>
        <p>
          One port per block. Visualization is set per block so the same sensor
          can show different outputs.
        </p>
        <span class="req-note">
          Fields marked <span class="req">*</span> are required
        </span>
      </div>

      <div id="sensors-list"></div>
      <div id="port-warning" class="port-warning"></div>

      <button class="add-block-btn" onclick="addBlock()">
        + Add sensor block
      </button>

      <button class="gen-btn" onclick="handleGenerate()">
        Generate + download .ino
      </button>

      <div class="success-banner" id="success-banner">
        <span>&#10003;</span>
        <span>
          <strong id="success-filename"></strong> Downloaded successfully.
        </span>
      </div>

      <div class="preview-wrap" id="preview-wrap">
        <div class="preview-head">
          <span>Code preview</span>
          <button class="copy-btn" onclick="copyPreview()">Copy</button>
        </div>
        <pre class="preview-code" id="preview-code"></pre>
      </div>
    </div>

    <div id="survey-overlay" class="survey-overlay">
      <div class="survey-modal">
        <div class="survey-modal-head">
          <span class="survey-title">Before you download</span>
          <button class="survey-close" onclick="closeSurvey()" title="Cancel">
            &#x2715;
          </button>
        </div>
        <div class="survey-modal-body" id="survey-body"></div>
        <div class="survey-modal-foot">
          <button class="survey-cancel-btn" onclick="closeSurvey()">
            Cancel
          </button>
          <button class="survey-confirm-btn" onclick="confirmSurvey()">
            Confirm + download
          </button>
        </div>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
