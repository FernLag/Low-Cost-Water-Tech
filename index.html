<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Pillowtech Code Generator</title>
    <link rel="icon" type="image/png" href="/Pillowtech_image.png" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Pillowtech Code Generator</h1>
        <p>
          One port per block. Visualization is set per block so the same sensor
          can show different outputs.
        </p>
        <span class="req-note">
          Fields marked <span class="req">*</span> are required
        </span>
      </div>
      <div id="saved-banner" class="saved-banner"></div>
      <div id="sensors-list"></div>
      <div id="port-warning" class="port-warning"></div>
      <button class="add-block-btn" onclick="addBlock()">
        + Add sensor block
      </button>
      <button class="gen-btn" onclick="handleGenerate()">
        Generate + download .ino
      </button>
      <div class="success-banner" id="success-banner">
        <span>&#10003;</span>
        <span>
          <strong id="success-filename"></strong> Downloaded successfully.
        </span>
      </div>
      <div class="preview-wrap" id="preview-wrap">
        <div class="preview-head">
          <span>Code preview</span>
          <button class="copy-btn" onclick="copyPreview()">Copy</button>
        </div>
        <pre class="preview-code" id="preview-code"></pre>
      </div>
    </div>

    <div id="survey-overlay" class="survey-overlay">
      <div class="survey-modal">
        <div class="survey-modal-head">
          <span class="survey-title">Before you download</span>
          <button class="survey-close" onclick="closeSurvey()" title="Cancel">
            &#x2715;
          </button>
        </div>
        <div class="survey-modal-body" id="survey-body"></div>
        <div class="survey-modal-foot">
          <label class="consent-label">
            <input
              type="checkbox"
              id="consent-checkbox"
              onchange="
                document.getElementById('confirm-btn').disabled = !this.checked
              "
            />
            I agree to share my information and understand it will be used for
            research purposes.
            <a
              href="Pillowtech_consent_form.pdf"
              target="Pillowtech consent form"
              rel="noopener"
              class="consent-link"
              >For more information</a
            >
          </label>
          <div class="survey-foot-btns">
            <button class="survey-cancel-btn" onclick="closeSurvey()">
              Cancel
            </button>
            <button
              class="survey-confirm-btn"
              id="confirm-btn"
              onclick="confirmSurvey()"
              disabled
            >
              Confirm + download
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
