<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <script src="main.js"></script>
    <title>Sensor Code Generator</title>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Arduino sensor code generator</h1>
        <p>
          One port per block. Use the <strong>+</strong> buttons to add options
          to each dropdown or add more parameter rows.
        </p>
        <span class="req-note"
          >Fields marked <span class="req">*</span> are mandatory</span
        >
      </div>

      <div id="sensors-list"></div>
      <div id="port-warning" class="port-warning"></div>

      <button class="add-block-btn" onclick="addBlock()">
        + Add sensor block
      </button>

      <div class="viz-section">
        <div class="slabel">
          Visualization — optional · applied to all sensors
        </div>
        <div class="field">
          <label>Visualization type</label>
          <select id="viz">
            <option value="bar">Bar graph (Serial plotter)</option>
            <option value="raw">Raw value print</option>
            <option value="state">State label — dry / moist / wet</option>
            <option value="color">RGB LED color indicator</option>
            <option value="threshold">Threshold alert</option>
            <option value="csv">CSV logging</option>
            <option value="json">JSON output</option>
            <option value="oled">OLED display</option>
            <option value="buzzer">Buzzer alert</option>
            <option value="average">Rolling average</option>
          </select>
        </div>
      </div>

      <button class="gen-btn" onclick="handleGenerate()">
        Generate + download .ino
      </button>

      <div class="success-banner" id="success-banner">
        <span>&#10003;</span>
        <span
          ><strong id="success-filename"></strong> downloaded
          successfully.</span
        >
      </div>

      <div class="preview-wrap" id="preview-wrap">
        <div class="preview-head">
          <span>Generated code preview</span>
          <button class="copy-btn" onclick="copyPreview()">Copy</button>
        </div>
        <pre class="preview-code" id="preview-code"></pre>
      </div>
    </div>
  </body>
</html>
